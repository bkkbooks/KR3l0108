body:
  text: 桂苑叢談小説家𩔖二異聞之屬提要臣等謹案桂苑叢談一卷考新唐書藝文志載桂苑叢談註曰馮翊子子休撰不著姓名晁公武引李淑邯鄲書目云姓嚴疑馮翊子其號而子休其字也陳繼儒刻入祕笈乃題為唐子休馮翊著顛倒其文誤之甚矣其書前十條皆載咸通以後鬼神怪異及瑣細之事後為史遺十八條其十二條亦紀唐代雜事餘六條則兼及南北朝然如髙浟捕賊髙延宗縱恣崔宏度酷虐諸事齊隋本史皆已載之又似摘鈔卷中未及刋削者疑已經後人竄亂非原書也其甘露亭一條稱吴王收復浙右之嵗者當為昭宗天復二年時始封楊行密為吴王故子休以此稱之然則作是書者其江南人歟乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:53d1a625d60a06f7018b913cbcdf944b7df129298fff3df0a0616134ec1a71fd
